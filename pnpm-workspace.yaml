packages:
  - "apps/*"
  - "packages/*"
  - "workers/*"

# Supply-chain hygiene: skip packages published in the last 24h (1440 min).
# Protects forkers from compromised fresh releases like the chalk/debug 2025 attack.
minimumReleaseAge: 1440

# Single source of truth for cross-workspace versions. Reference with `"typescript": "catalog:"`.
catalog:
  # Language
  typescript: 5.8.3

  # React
  react: 18.3.1
  react-dom: 18.3.1
  "@types/react": ^18.3.12
  "@types/react-dom": ^18.3.1

  # Build tooling
  vite: ^7.0.0
  "@vitejs/plugin-react": ^4.3.4
  tsdown: ^0.22.0

  # Test tooling
  vitest: ^3.2.0
  "@cloudflare/vitest-pool-workers": ^0.6.0
  jest: ^29.7.0
  ts-jest: ^29.2.5
  jest-environment-jsdom: ^29.7.0
  "@testing-library/react": ^16.0.0
  "@testing-library/jest-dom": ^6.6.3
  "@testing-library/user-event": ^14.5.2
  "@types/jest": ^29.5.14
  identity-obj-proxy: ^3.0.0

  # Cloudflare Workers
  hono: ^4.6.0
  wrangler: ^3.114.17
  "@cloudflare/workers-types": ^4.20251101.0

  # Styling
  tailwindcss: ^4.1.0
  "@tailwindcss/vite": ^4.1.0
  "@tailwindcss/postcss": ^4.1.0

  # Lint / format
  "@antfu/eslint-config": ^3.10.0
  eslint: ^9.39.0
  prettier: ^3.4.2

  # Misc shared
  "@types/node": ^20.17.0
