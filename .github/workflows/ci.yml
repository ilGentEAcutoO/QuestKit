name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read
  security-events: write

jobs:
  verify:
    name: Lint, typecheck, test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.27.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint
        env:
          CI: "1"

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: gitleaks.toml
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level=high
        continue-on-error: true

  newman:
    name: Newman API contract tests
    runs-on: ubuntu-latest
    needs: [verify]
    # PRs can't access the QUESTKIT_APP_SECRET secret. Only run Newman on
    # pushes to main, so the production worker is exercised after the merge.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Run Newman against api.questkit.jairukchan.com
        env:
          BASE_URL: https://api.questkit.jairukchan.com
          APP_ID: demo
          APP_SECRET: ${{ secrets.QUESTKIT_APP_SECRET }}
        run: bash ./postman/newman-ci.sh

      - name: Upload Newman JSON report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: newman-report
          path: ./postman/newman-report.json
