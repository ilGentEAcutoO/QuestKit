name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read
  security-events: write

jobs:
  verify:
    name: Lint, typecheck, test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.27.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The Env type in worker-configuration.d.ts is generated at install-time
      # locally; the file is gitignored per spec §11. CI must regenerate it for
      # every worker so typecheck + test can resolve c.env.DB, c.env.WEBHOOK_QUEUE,
      # etc.
      - name: Generate wrangler types
        run: |
          pnpm --filter @questkit/worker-api cf-typegen
          pnpm --filter @questkit/worker-webhook-relay cf-typegen
          pnpm --filter @questkit/worker-webhook-consumer cf-typegen

      - name: Lint
        run: pnpm lint
        env:
          CI: "1"

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: gitleaks.toml
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level=high
        continue-on-error: true

  # SonarQube/SonarCloud quality gate (per plan amendment A22). Gated on
  # secrets.SONAR_TOKEN being set so the workflow stays green for forks/PRs
  # that don't have access to the secret. To enable: create the SonarCloud
  # org + import this repo (SonarCloud → My Account → Add → GitHub), then
  # add SONAR_TOKEN to GitHub repo Secrets. The badge in README will go
  # live on the next push.
  sonarcloud:
    name: SonarCloud quality gate
    runs-on: ubuntu-latest
    needs: [verify]
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Probe for SONAR_TOKEN
        id: probe
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::SONAR_TOKEN secret not set — skipping SonarCloud scan. Enable by creating the SonarCloud org and adding the token in GitHub Settings → Secrets."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: SonarQube scan
        if: steps.probe.outputs.skip == 'false'
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  newman:
    name: Newman API contract tests
    runs-on: ubuntu-latest
    needs: [verify]
    # PRs can't access the QUESTKIT_APP_SECRET secret. Only run Newman on
    # pushes to main, so the production worker is exercised after the merge.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Run Newman against api.questkit.jairukchan.com
        env:
          BASE_URL: https://api.questkit.jairukchan.com
          APP_ID: demo
          APP_SECRET: ${{ secrets.QUESTKIT_APP_SECRET }}
        run: bash ./postman/newman-ci.sh

      - name: Upload Newman JSON report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: newman-report
          path: ./postman/newman-report.json
