name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  verify:
    name: Lint, typecheck, test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.27.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The Env type in worker-configuration.d.ts is generated at install-time
      # locally; the file is gitignored per spec §11. CI must regenerate it for
      # every worker so typecheck + test can resolve c.env.DB, c.env.WEBHOOK_QUEUE,
      # etc.
      - name: Generate wrangler types
        run: |
          pnpm --filter @questkit/worker-api cf-typegen
          pnpm --filter @questkit/worker-webhook-relay cf-typegen
          pnpm --filter @questkit/worker-webhook-consumer cf-typegen

      - name: Lint
        run: pnpm lint
        env:
          CI: "1"

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITLEAKS_CONFIG: gitleaks.toml
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level=high
        continue-on-error: true

  # ---------------------------------------------------------------------------
  # SonarCloud (note for future contributors):
  #
  # No SonarCloud job is wired into CI on purpose. SonarCloud is set up to
  # use its **Automatic Analysis** mode (the default after importing the
  # repo), which scans every push from sonarcloud.io's side without any
  # CI-side action. The README quality-gate badge is driven directly off
  # those Auto Analysis results.
  #
  # If a future contributor wants CI-based analysis (e.g. for monorepo
  # coverage merging or custom scanner properties), they must FIRST disable
  # Automatic Analysis at:
  #   https://sonarcloud.io/project/analysis_method?id=ilGentEAcutoO_QuestKit
  # SonarCloud rejects CI scans while Auto Analysis is active with:
  #   "ERROR You are running CI analysis while Automatic Analysis is enabled"
  # Then add a sonarcloud job here using SonarSource/sonarqube-scan-action@v6
  # (v5 has the GHSA-5xq9-5g24-4g6f argument-injection advisory).
  # ---------------------------------------------------------------------------

  newman:
    name: Newman API contract tests
    runs-on: ubuntu-latest
    needs: [verify]
    # PRs can't access the QUESTKIT_APP_SECRET secret. Only run Newman on
    # pushes to main, so the production worker is exercised after the merge.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc

      - name: Run Newman against api.questkit.jairukchan.com
        env:
          BASE_URL: https://api.questkit.jairukchan.com
          APP_ID: demo
          APP_SECRET: ${{ secrets.QUESTKIT_APP_SECRET }}
        run: bash ./postman/newman-ci.sh

      - name: Upload Newman JSON report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: newman-report
          path: ./postman/newman-report.json
