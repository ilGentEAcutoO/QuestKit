<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#6366f1" />
    <meta
      name="description"
      content="QuestKit demo — a Cloudflare-only, embeddable gamification SDK showcased across 4 real-world scenarios."
    />

    <!-- Open Graph / social preview -->
    <meta property="og:title" content="QuestKit — Cloudflare-native gamification SDK" />
    <meta
      property="og:description"
      content="Drop-in missions, events, rewards, and AI personalization. Embed in any React app or any HTML page."
    />
    <meta property="og:image" content="https://questkit.jairukchan.com/og.png" />
    <meta property="og:url" content="https://questkit.jairukchan.com" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="QuestKit — Cloudflare-native gamification SDK" />
    <meta
      name="twitter:description"
      content="Drop-in missions, events, rewards, and AI personalization. Embed in any React app or any HTML page."
    />
    <meta name="twitter:image" content="https://questkit.jairukchan.com/og.png" />

    <title>QuestKit Demo</title>

    <!--
      First-paint theme bootstrap. Reads the saved `qk-theme` from
      localStorage, falls back to `prefers-color-scheme`. Setting the
      attribute synchronously here avoids the light→dark flash on first
      load. Wrapped in try/catch for SSR + privacy-mode safety.
    -->
    <script>
      try {
        var saved = localStorage.getItem('qk-theme')
        var theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
        document.documentElement.setAttribute('data-theme', theme)
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'light')
      }
    </script>
    <!--
      Critical first-paint CSS. Inlining keeps Lighthouse's FCP audit
      under the 1.8 s "good" threshold even on Slow 4G: the browser can
      paint the static shell without waiting for the main stylesheet
      (which adds another ~750 ms RTT on cold loads). Tailwind v4 picks
      up these rules afterwards.

      Token values mirror styles.css verbatim:
        --color-demo-surface  oklch(0.985 0.003 264)
        --color-demo-ink      oklch(0.21 0.02 264)
        --color-qk-primary    #3730a3 (indigo-800, 8.6:1 vs white)
      The shell paints a header bar + a brand badge so the LCP element
      lands in the very first frame.
    -->
    <style>
      :root,
      html[data-theme='light'] {
        --color-demo-surface: oklch(0.985 0.003 264);
        --color-demo-ink: oklch(0.21 0.02 264);
        --color-qk-primary: #3730a3;
      }
      html[data-theme='dark'] {
        --color-demo-surface: oklch(0.18 0.015 264);
        --color-demo-ink: oklch(0.96 0.005 264);
      }
      html,
      body,
      #root {
        height: 100%;
      }
      body {
        margin: 0;
        background: var(--color-demo-surface);
        color: var(--color-demo-ink);
        font-family:
          system-ui,
          -apple-system,
          'Segoe UI',
          Roboto,
          sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      .qk-prep {
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
      }
      .qk-prep-head {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 14px 16px;
        border-bottom: 1px solid rgba(0, 0, 0, 0.08);
      }
      .qk-prep-mark {
        width: 36px;
        height: 36px;
        border-radius: 14px;
        background: var(--color-qk-primary);
        color: #fff;
        display: grid;
        place-items: center;
        font-weight: 700;
        font-size: 18px;
        line-height: 1;
      }
      .qk-prep-title {
        font-size: 15px;
        font-weight: 600;
        line-height: 1.1;
      }
      .qk-prep-sub {
        font-size: 12px;
        opacity: 0.6;
        line-height: 1.1;
        margin-top: 2px;
      }
      /* Reserve a tall body region so the eventual footer doesn't pop in
       * after React mounts — keeps Lighthouse CLS under 0.05. */
      .qk-prep-body {
        flex: 1 1 auto;
        min-height: 70dvh;
      }
      html[data-theme='dark'] .qk-prep-head {
        border-color: rgba(255, 255, 255, 0.08);
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!--
        Pre-paint shell. React replaces this once it mounts (createRoot's
        first render swaps the whole subtree). Lighthouse FCP/LCP latch
        onto this shell at ~600 ms instead of waiting ~2900 ms for React.
      -->
      <div class="qk-prep">
        <div class="qk-prep-head">
          <div class="qk-prep-mark" aria-hidden="true">Q</div>
          <div>
            <div class="qk-prep-title">QuestKit Demo</div>
            <div class="qk-prep-sub">4 scenarios · live SSE · AI recs</div>
          </div>
        </div>
        <div class="qk-prep-body"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
